<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maluniversum XXL</title>

<style>
    body {
        margin: 0;
        background: white;
        font-family: Arial, sans-serif;
    }

    /* ZURÜCK-BUTTON LINKS OBEN */
    #backBtn {
        position: fixed;
        top: 10px;
        left: 10px;
        background: #FFD86B;
        padding: 8px 14px;
        border-radius: 8px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 6px rgba(0,0,0,0.25);
        z-index: 9999;
        font-size: 18px;
    }

    /* TOOLBAR RECHTS */
    #toolbar {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(255,255,255,0.95);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        z-index: 10;
        max-width: 180px;
    }

    #toolbar button {
        margin-top: 4px;
        width: 150px;
        padding: 6px;
        cursor: pointer;
    }

    canvas {
        display: block;
    }

    /* Etsy Button */
    #etsyBtn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: #FFD86B;
        padding: 12px 18px;
        border-radius: 10px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
        z-index: 20;
    }

    /* Gratis App Button */
    #appBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #7EC8E3;
        padding: 12px 18px;
        border-radius: 10px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
        z-index: 20;
    }

    /* GALERIE POPUP */
    #galleryPopup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.3);
        z-index: 9998;
        display: none;
        width: 90%;
        max-width: 350px;
        text-align: center;
    }

    .gallery-img {
        width: 80px;
        height: 80px;
        margin: 6px;
        border: 2px solid #ccc;
        border-radius: 6px;
        cursor: pointer;
        object-fit: cover;
    }

    #closeGallery {
        margin-top: 10px;
        padding: 6px 12px;
        background: #FFD86B;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>

<body>

<!-- ZURÜCK-BUTTON LINKS -->
<a id="backBtn" href="index.html">⬅</a>

<!-- TOOLBAR RECHTS -->
<div id="toolbar">
    <strong>Farbe & Größe</strong><br>
    <input type="color" id="colorPicker" value="#ff0000"><br><br>
    <input type="range" id="sizeSlider" min="1" max="40" value="5"><br><br>

    <strong>Werkzeuge</strong><br>
    <button id="pencilBtn">Stift</button>
    <button id="eraserBtn">Radiergummi</button>
    <button id="rainbowBtn">Regenbogen‑Pinsel</button>
    <button id="sprayBtn">Sprühdose</button><br>

    <strong>Vorlagen</strong><br>
    <button id="templateBtn">Vorlagen</button><br>

    <strong>Aktionen</strong><br>
    <button id="clearBtn">Löschen</button>
    <button id="saveBtn">Speichern</button>
</div>

<!-- Etsy Button -->
<a id="etsyBtn" href="https://www.etsy.com/shop/maluniversum" target="_blank">
    🐄 Bauernhof‑Ausmalbuch im Etsy‑Shop
</a>

<!-- Gratis App Button -->
<div id="appBtn">
    🎨 Gratis Mal‑App – bald verfügbar
</div>

<!-- GALERIE POPUP MIT BEISPIELBILDERN -->
<div id="galleryPopup">
    <h3>Vorlagen auswählen</h3>

    <!-- Beispielbilder (Platzhalter) -->
    <img src="https://placehold.co/300x300?text=Kuh" class="gallery-img" data-template="kuh">
    <img src="https://placehold.co/300x300?text=Traktor" class="gallery-img" data-template="traktor">
    <img src="https://placehold.co/300x300?text=Haus" class="gallery-img" data-template="haus">

    <div id="closeGallery">Schließen</div>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// Canvas auf Fenstergröße setzen
function resizeCanvas() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let painting = false;
let currentColor = "#ff0000";
let currentSize = 5;
let tool = "pencil";
let rainbowHue = 0;

// Toolbar Events
document.getElementById("colorPicker").addEventListener("input", e => {
    currentColor = e.target.value;
    if (tool === "rainbow") tool = "pencil";
});

document.getElementById("sizeSlider").addEventListener("input", e => {
    currentSize = e.target.value;
});

document.getElementById("pencilBtn").addEventListener("click", () => tool = "pencil");
document.getElementById("eraserBtn").addEventListener("click", () => tool = "eraser");
document.getElementById("rainbowBtn").addEventListener("click", () => tool = "rainbow");
document.getElementById("sprayBtn").addEventListener("click", () => tool = "spray");

document.getElementById("clearBtn").addEventListener("click", () => {
    ctx.clearRect(0, 0, c.width, c.height);
});

// SPEICHERN
document.getElementById("saveBtn").addEventListener("click", () => {
    const exportCanvas = document.createElement("canvas");
    const exportCtx = exportCanvas.getContext("2d");

    exportCanvas.width = c.width;
    exportCanvas.height = c.height;

    exportCtx.fillStyle = "white";
    exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

    exportCtx.drawImage(c, 0, 0);

    exportCtx.font = "24px Arial";
    exportCtx.fillStyle = "rgba(0,0,0,0.6)";
    exportCtx.textAlign = "right";
    exportCtx.fillText("© Charlytaxi", exportCanvas.width - 20, exportCanvas.height - 20);

    const name = prompt("Dateiname eingeben:", "Maluniversum.png");
    if (!name) return;

    const link = document.createElement("a");
    link.download = name.endsWith(".png") ? name : name + ".png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
});

// Zeichnen
function start(e) {
    painting = true;
    draw(e);
}

function end() {
    painting = false;
    ctx.beginPath();
}

function getPos(e) {
    const rect = c.getBoundingClientRect();
    return {
        x: (e.clientX || e.pageX) - rect.left,
        y: (e.clientY || e.pageY) - rect.top
    };
}

function draw(e) {
    if (!painting) return;

    const pos = getPos(e);
    const x = pos.x;
    const y = pos.y;

    if (tool === "spray") {
        sprayAt(x, y);
        return;
    }

    if (tool === "eraser") {
        ctx.strokeStyle = "white";
        ctx.lineWidth = currentSize * 2;
    } else if (tool === "rainbow") {
        rainbowHue = (rainbowHue + 3) % 360;
        ctx.strokeStyle = `hsl(${rainbowHue}, 100%, 50%)`;
        ctx.lineWidth = currentSize;
    } else {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
    }

    ctx.lineCap = "round";
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}

function sprayAt(x, y) {
    const density = 25;
    ctx.fillStyle = currentColor;
    for (let i = 0; i < density; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * currentSize * 2;
        const sx = x + Math.cos(angle) * radius;
        const sy = y + Math.sin(angle) * radius;
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }
}

// Maus
c.addEventListener("mousedown", start);
c.addEventListener("mouseup", end);
c.addEventListener("mouseleave", end);
c.addEventListener("mousemove", draw);

// Touch
c.addEventListener("touchstart", e => {
    e.preventDefault();
    start(e.touches[0]);
});

c.addEventListener("touchend", e => {
    e.preventDefault();
    end();
});

c.addEventListener("touchcancel", e => {
    e.preventDefault();
    end();
});

c.addEventListener("touchmove", e => {
    e.preventDefault();
    draw(e.touches[0]);
});

// GALERIE
document.getElementById("templateBtn").addEventListener("click", () => {
    document.getElementById("galleryPopup").style.display = "block";
});

document.getElementById("closeGallery").addEventListener("click", () => {
    document.getElementById("galleryPopup").style.display = "none";
});

document.querySelectorAll(".gallery-img").forEach(img => {
    img.addEventListener("click", () => {
        const src = img.src;

        ctx.clearRect(0, 0, c.width, c.height);

        const template = new Image();
        template.src = src;

        template.onload = () => {
            const scale = Math.min(c.width / template.width, c.height / template.height);
            const w = template.width * scale;
            const h = template.height * scale;
            const x = (c.width - w) / 2;
            const y = (c.height - h) / 2;

            ctx.drawImage(template, x, y, w, h);
        };

        document.getElementById("galleryPopup").style.display = "none";
    });
});
</script>

</body>
</html>
