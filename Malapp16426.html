<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maluniversum XXL</title>

<style>
    body {
        margin: 0;
        background: white;
        font-family: Arial, sans-serif;
    }

    /* ZURÜCK-BUTTON LINKS OBEN */
    #backBtn {
        position: fixed;
        top: 10px;
        left: 10px;
        background: #FFD86B;
        padding: 8px 14px;
        border-radius: 8px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 6px rgba(0,0,0,0.25);
        z-index: 9999;
        font-size: 18px;
    }

    /* TOOLBAR RECHTS */
    #toolbar {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(255,255,255,0.95);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        z-index: 10;
        max-width: 180px;
    }

    #toolbar button {
        margin-top: 4px;
        width: 150px;
        padding: 6px;
        cursor: pointer;
    }

    canvas {
        display: block;
    }

    /* Etsy Button */
    #etsyBtn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: #FFD86B;
        padding: 12px 18px;
        border-radius: 10px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
        z-index: 20;
    }

    /* Gratis App Button */
    #appBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #7EC8E3;
        padding: 12px 18px;
        border-radius: 10px;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
        z-index: 20;
    }

    /* GALERIE POPUP */
    #galleryPopup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.3);
        z-index: 9998;
        display: none;
        width: 90%;
        max-width: 350px;
        text-align: center;
    }

    .gallery-img {
        width: 80px;
        height: 80px;
        margin: 6px;
        border: 2px solid #ccc;
        border-radius: 6px;
        cursor: pointer;
        object-fit: cover;
    }

    #closeGallery {
        margin-top: 10px;
        padding: 6px 12px;
        background: #FFD86B;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>

<body>

<!-- ZURÜCK-BUTTON LINKS -->
<a id="backBtn" href="index.html">⬅</a>

<!-- TOOLBAR RECHTS -->
<div id="toolbar">
    <strong>Farbe & Größe</strong><br>
    <input type="color" id="colorPicker" value="#ff0000"><br><br>
    <input type="range" id="sizeSlider" min="1" max="40" value="5"><br><br>

    <strong>Werkzeuge</strong><br>
    <button id="pencilBtn">Stift</button>
    <button id="eraserBtn">Radiergummi</button>
    <button id="rainbowBtn">Regenbogen‑Pinsel</button>
    <button id="sprayBtn">Sprühdose</button><br>

    <strong>Vorlagen</strong><br>
    <button id="templateBtn">Vorlagen</button><br>

    <strong>Aktionen</strong><br>
    <button id="clearBtn">Löschen</button>
    <button id="saveBtn">Speichern</button>
</div>

<!-- Etsy Button -->
<a id="etsyBtn" href="https://www.etsy.com/shop/maluniversum" target="_blank">
    🐄 Bauernhof‑Ausmalbuch im Etsy‑Shop
</a>

<!-- Gratis App Button -->
<div id="appBtn">
    🎨 Gratis Mal‑App – bald verfügbar
</div>

<!-- GALERIE POPUP OHNE BILDER -->
<div id="galleryPopup">
    <h3>Vorlagen auswählen</h3>

    <!-- Hier kommen deine echten Bilder rein -->
    <!-- Beispiel:
    <img src="assets/kuh.png" class="gallery-img" data-template="kuh">
    -->

    <div id="closeGallery">Schließen</div>
</div>

<canvas id="c"></canvas>

<script>
/* --- JavaScript unverändert --- */
</script>

</body>
</html>
