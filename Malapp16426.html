‎<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Maluniversuma – Zeichenapp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #toolbar {
            margin-bottom: 15px;
        }

        #toolbar > * {
            margin: 0 5px;
        }

        #canvasWrapper {
            display: inline-block;
            background: #ffffff;
            border: 2px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        canvas {
            cursor: crosshair;
            touch-action: none;
        }

        button {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #888;
            background: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #eee;
        }

        #etsyBtn {
            background: #ff8c00;
            color: white;
            font-weight: bold;
        }

        #downloadInfoBtn {
            background: #4caf50;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🌸 Maluniversuma – Zeichenapp</h1>
    <p>Gratis Mal-App – zeichne direkt im Browser.</p>

    <div id="toolbar">
        <label>Farbe:
            <input type="color" id="colorPicker" value="#000000">
        </label>

        <label>Pinselgröße:
            <input type="range" id="sizePicker" min="1" max="40" value="5">
            <span id="sizeLabel">5 px</span>
        </label>

        <button id="brushBtn">Normal</button>
        <button id="sprayBtn">Sprühdose</button>
        <button id="rainbowBtn">Regenbogen</button>

        <button id="clearBtn">Leeren</button>
        <button id="saveBtn">Als Bild speichern</button>

        <button id="etsyBtn">🛒 Etsy-Shop</button>
        <button id="downloadInfoBtn">📥 App bald downloadbar</button>
    </div>

    <div id="canvasWrapper">
        <canvas id="drawCanvas" width="1200" height="700"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("drawCanvas");
        const ctx = canvas.getContext("2d");

        const colorPicker = document.getElementById("colorPicker");
        const sizePicker = document.getElementById("sizePicker");
        const sizeLabel = document.getElementById("sizeLabel");
        const clearBtn = document.getElementById("clearBtn");
        const saveBtn = document.getElementById("saveBtn");

        const brushBtn = document.getElementById("brushBtn");
        const sprayBtn = document.getElementById("sprayBtn");
        const rainbowBtn = document.getElementById("rainbowBtn");

        const etsyBtn = document.getElementById("etsyBtn");
        const downloadInfoBtn = document.getElementById("downloadInfoBtn");

        let drawing = false;
        let lastX = 0;
        let lastY = 0;

        let tool = "brush"; 
        let hue = 0;

        function fillWhiteBackground() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        fillWhiteBackground();

        sizePicker.addEventListener("input", () => {
            sizeLabel.textContent = sizePicker.value + " px";
        });

        brushBtn.addEventListener("click", () => tool = "brush");
        sprayBtn.addEventListener("click", () => tool = "spray");
        rainbowBtn.addEventListener("click", () => tool = "rainbow");

        etsyBtn.addEventListener("click", () => {
            window.open("https://www.etsy.com/shop/maluniversum", "_blank");
        });

        downloadInfoBtn.addEventListener("click", () => {
            alert("Hier kannst du bald die Maluniversum-App herunterladen!");
        });

        function getPos(evt) {
            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (evt.touches && evt.touches.length > 0) {
                x = evt.touches[0].clientX - rect.left;
                y = evt.touches[0].clientY - rect.top;
            } else {
                x = evt.clientX - rect.left;
                y = evt.clientY - rect.top;
            }
            return { x, y };
        }

        function startDrawing(evt) {
            evt.preventDefault();
            drawing = true;
            const pos = getPos(evt);
            lastX = pos.x;
            lastY = pos.y;
        }

        function spray(x, y) {
            const density = 20;
            for (let i = 0; i < density; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * sizePicker.value * 2;
                const offsetX = Math.cos(angle) * radius;
                const offsetY = Math.sin(angle) * radius;

                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(x + offsetX, y + offsetY, 1, 1);
            }
        }

        function rainbowStroke() {
            hue = (hue + 2) % 360;
            return `hsl(${hue}, 100%, 50%)`;
        }

        function draw(evt) {
            if (!drawing) return;
            evt.preventDefault();
            const pos = getPos(evt);

            if (tool === "spray") {
                spray(pos.x, pos.y);
                lastX = pos.x;
                lastY = pos.y;
                return;
            }

            ctx.lineWidth = sizePicker.value;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            if (tool === "rainbow") {
                ctx.strokeStyle = rainbowStroke();
            } else {
                ctx.strokeStyle = colorPicker.value;
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing(evt) {
            if (!drawing) return;
            evt.preventDefault();
            drawing = false;
        }

        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("mouseup", stopDrawing);
        canvas.addEventListener("mouseleave", stopDrawing);

        canvas.addEventListener("touchstart", startDrawing, { passive: false });
        canvas.addEventListener("touchmove", draw, { passive: false });
        canvas.addEventListener("touchend", stopDrawing, { passive: false });
        canvas.addEventListener("touchcancel", stopDrawing, { passive: false });

        clearBtn.addEventListener("click", () => {
            fillWhiteBackground();
        });

        saveBtn.addEventListener("click", () => {
            const link = document.createElement("a");
            link.download = "maluniversuma-bild.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    </script>
</body>
</html>
